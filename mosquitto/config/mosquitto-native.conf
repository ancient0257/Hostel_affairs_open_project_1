# Mosquitto 2.x — native Windows config
# Data/log paths use workspace-relative directories

listener 1883
protocol mqtt
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location D:\phy_iota\iotlab\iotlab\mosquitto\data

log_dest file D:\phy_iota\iotlab\iotlab\mosquitto\log\mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
